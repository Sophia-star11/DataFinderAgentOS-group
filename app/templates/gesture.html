<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手势交互 - 智能瞭望</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:24px;margin:20px 0 8px}
h1 span{background:linear-gradient(90deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#888;font-size:14px;margin-bottom:24px}
.video-container{position:relative;width:640px;max-width:95vw;border-radius:16px;overflow:hidden;border:3px solid rgba(255,255,255,.1);min-height:120px;display:flex;align-items:center;justify-content:center;background:#000}
#webcam{width:100%;display:block}
#videoCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
.feedback-bar{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.feedback-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 20px;text-align:center;min-width:140px;transition:all .3s;cursor:pointer}
.feedback-item:hover{background:rgba(255,255,255,.1)}
.feedback-item.active{border-color:#f093fb;background:rgba(240,147,251,.1);transform:scale(1.05)}
.feedback-item.triggered{border-color:#43e97b;background:rgba(67,233,123,.15);animation:pulse .5s ease-out}
@keyframes pulse{0%{transform:scale(1.05)}50%{transform:scale(1.12)}100%{transform:scale(1.05)}}
.feedback-item .emoji{font-size:36px;display:block;margin-bottom:8px}
.feedback-item .label{font-size:13px;color:#ccc}
.feedback-item .action{font-size:11px;color:#888;margin-top:4px}
#gestureStatus{text-align:center;font-size:16px;color:#aaa;margin:8px 0;min-height:24px}
#gestureStatus .detected{color:#43e97b;font-weight:bold}
#triggeredInfo{text-align:center;font-size:13px;color:#ffd700;margin-top:8px;min-height:20px}

/* 流式输出面板 */
.result-panel{width:640px;max-width:95vw;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-top:16px;display:none;max-height:400px;overflow-y:auto}
.result-panel.visible{display:block}
.result-panel .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.result-panel .result-title{font-size:14px;color:#ccc}
.result-panel .result-close{background:none;border:none;color:#888;cursor:pointer;font-size:18px}
.result-panel .result-content{font-size:14px;color:#ddd;line-height:1.8;word-break:break-word}
.result-panel .result-content h1,.result-panel .result-content h2,.result-panel .result-content h3{color:#fff;margin:12px 0 6px}
.result-panel .result-content strong{color:#fff}
.result-panel .result-content a{color:#6ea8fe;text-decoration:none}
.result-panel .result-content ul,.result-panel .result-content ol{padding-left:20px;margin:8px 0}
.result-panel .result-content code{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-size:13px}
.result-panel .result-content pre{background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow-x:auto}
.result-panel .result-content .streaming-cursor{display:inline-block;width:8px;height:16px;background:#43e97b;animation:blink .6s infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}
.result-panel .result-employee{font-size:12px;color:#888;margin-bottom:8px}

.btn-row{margin-top:16px}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;margin:4px}
.btn-primary{background:#4e6ef2;color:#fff}
.btn-back{background:rgba(255,255,255,.1);color:#ccc}
.demo-note{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.3);border-radius:8px;padding:10px 16px;margin-top:12px;font-size:13px;color:#ffc107;text-align:center;display:none}
</style>
</head>
<body>
<h1>🖐 <span>手势交互</span> 数字员工调度</h1>
<p class="subtitle">摄像头识别手势 → 自动调用对应数字员工 → 流式输出结果</p>
<div class="video-container">
  <video id="webcam" autoplay playsinline muted style="width:100%;display:block"></video>
  <canvas id="videoCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
</div>
<div id="gestureStatus">正在加载手势识别库...</div>
<div id="triggeredInfo"></div>
<div class="demo-note" id="demoNote">⚠ 手势识别库加载失败，可使用下方按钮模拟触发</div>

<div class="feedback-bar">
  <div class="feedback-item" id="gestureScissor" data-gesture="scissor">
    <span class="emoji">✌️</span>
    <span class="label">剪刀手</span>
    <span class="action">→ 查询天气</span>
  </div>
  <div class="feedback-item" id="gestureFist" data-gesture="fist">
    <span class="emoji">✊</span>
    <span class="label">握拳</span>
    <span class="action">→ 随机音乐</span>
  </div>
  <div class="feedback-item" id="gesturePalm" data-gesture="palm">
    <span class="emoji">🖐</span>
    <span class="label">手掌</span>
    <span class="action">→ 新闻</span>
  </div>
</div>

<!-- 流式输出结果面板 -->
<div class="result-panel" id="resultPanel">
  <div class="result-header">
    <span class="result-title" id="resultTitle">结果</span>
    <button class="result-close" onclick="closeResult()">✕</button>
  </div>
  <div class="result-employee" id="resultEmployee"></div>
  <div class="result-content" id="resultContent"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>
<div class="btn-row">
  <button class="btn btn-primary" onclick="location.href='/index'">返回工作台</button>
  <button class="btn btn-back" onclick="location.href='/chat'">返回对话</button>
</div>

<script>
// ---- 员工映射（从 API 动态加载）----
var employeeMap = {};  // gesture_type → { id, name, prompt }
var employeesLoaded = false;

var md = window.markdownit ? window.markdownit({ html: false, breaks: true, linkify: true }) : { render: function(t) { return t; } };

function getCookie(name) {
  var m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : '';
}

// 加载数字员工列表
async function loadEmployees() {
  try {
    var resp = await fetch('/api/user/digital-employees');
    var data = await resp.json();
    if (data.success && data.data) {
      var all = data.data || [];
      var findEmp = function(name) {
        return all.find(function(e) { return e.name === name; });
      };
      var weather = findEmp('天气');
      var music = findEmp('随机音乐');
      var news = findEmp('新闻');
      // 如果找不到精确名，模糊匹配
      if (!music) music = findEmp('音乐');
      if (!news) news = all.find(function(e) { return e.name && e.name.indexOf('新闻') !== -1; });

      if (weather) employeeMap['scissor'] = { id: weather.id, name: weather.name, prompt: '成都' };
      if (music)  employeeMap['fist']    = { id: music.id, name: music.name, prompt: '给我推荐一首歌' };
      if (news)   employeeMap['palm']    = { id: news.id, name: news.name, prompt: '今天有什么新闻' };
      employeesLoaded = true;
      document.getElementById('gestureStatus').textContent = '✅ 员工列表已加载，请做手势或点击下方卡片';
    }
  } catch (e) {
    console.error('加载员工失败:', e);
  }
}
loadEmployees();

// ---- 点击卡片触发 ----
document.querySelectorAll('.feedback-item').forEach(function(el) {
  el.addEventListener('click', function() {
    var gesture = this.dataset.gesture;
    if (gesture) triggerGesture(gesture);
  });
});

// ---- SSE 流式调用 ----
var currentAbort = null;

async function triggerGesture(type) {
  var emp = employeeMap[type];
  if (!emp) {
    document.getElementById('triggeredInfo').textContent = '⚠ 未找到对应数字员工: ' + type;
    return;
  }

  // 高亮卡片
  ['scissor', 'fist', 'palm'].forEach(function(g) {
    var el = document.getElementById('gesture' + g.charAt(0).toUpperCase() + g.slice(1));
    if (el) el.classList.toggle('triggered', g === type);
  });
  document.getElementById('triggeredInfo').textContent = '🔔 手势触发: @' + emp.name + ' → 流式输出中...';

  // 显示结果面板
  var panel = document.getElementById('resultPanel');
  var content = document.getElementById('resultContent');
  panel.classList.add('visible');
  document.getElementById('resultEmployee').textContent = '@' + emp.name;
  document.getElementById('resultTitle').textContent = emp.name + ' 回复';
  content.innerHTML = '<span class="streaming-cursor"></span>';

  // 取消之前的请求
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }

  var controller = new AbortController();
  currentAbort = controller;

  try {
    var messages = JSON.stringify([{ role: 'user', content: emp.prompt }]);
    var params = new URLSearchParams();
    params.set('messages', messages);
    params.set('employee_id', String(emp.id));
    var xsrf = getCookie('_xsrf');
    if (xsrf) params.set('_xsrf', xsrf);

    var resp = await fetch('/api/user/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString(),
      signal: controller.signal
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var fullText = '';

    while (true) {
      var batch = await reader.read();
      if (batch.done) break;

      buffer += decoder.decode(batch.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line || !line.startsWith('data: ')) continue;
        var dataStr = line.slice(6);
        if (dataStr === '[DONE]') continue;
        try {
          var json = JSON.parse(dataStr);
          // LLM流式: type=text + data字段
          if (json.type === 'text' && json.data) {
            fullText += json.data;
          }
          // API型/非流式: choices[0].delta.content
          else if (json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content) {
            fullText += json.choices[0].delta.content;
          }
          // 兜底: 直接content字段
          else if (json.content) {
            fullText += json.content;
          }
          content.innerHTML = md.render(fullText) + '<span class="streaming-cursor"></span>';
          panel.scrollTop = panel.scrollHeight;
        } catch (e) {}
      }
    }

    // 流结束，去掉光标
    content.innerHTML = md.render(fullText) || '(无返回内容)';
    document.getElementById('triggeredInfo').textContent = '✅ @' + emp.name + ' 完成';

  } catch (e) {
    if (e.name === 'AbortError') return;
    content.innerHTML = '<span style="color:#ff4d4f">请求失败: ' + escapeHtml(e.message) + '</span>';
    document.getElementById('triggeredInfo').textContent = '❌ 请求失败';
  } finally {
    currentAbort = null;
    ['scissor', 'fist', 'palm'].forEach(function(g) {
      var el = document.getElementById('gesture' + g.charAt(0).toUpperCase() + g.slice(1));
      if (el) setTimeout(function() { el.classList.remove('triggered'); }, 1000);
    });
  }
}

function closeResult() {
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('triggeredInfo').textContent = '';
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ---- 手势识别（MediaPipe）----
var lastGesture = null;
var gestureHoldStart = 0;

function classifyGesture(landmarks) {
  if (!landmarks || landmarks.length < 21) return null;
  var thumbUp = Math.abs(landmarks[4].x - landmarks[2].x) > 0.05;
  var fingersUp = [thumbUp];
  for (var i = 1; i < 5; i++) {
    var tip = 4 + i * 4, pip = tip - 2;
    fingersUp.push(landmarks[tip].y < landmarks[pip].y - 0.005);
  }
  if (fingersUp.every(function(f) { return !f; })) return 'fist';
  if (fingersUp.every(function(f) { return f; })) return 'palm';
  if (fingersUp[1] && fingersUp[2] && !fingersUp[3] && !fingersUp[4]) return 'scissor';
  return null;
}

function updateFeedback(gesture) {
  ['scissor', 'fist', 'palm'].forEach(function(g) {
    var el = document.getElementById('gesture' + g.charAt(0).toUpperCase() + g.slice(1));
    if (el) el.classList.toggle('active', g === gesture);
  });
}

function onHandsResults(results) {
  var statusEl = document.getElementById('gestureStatus');
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    var landmarks = results.multiHandLandmarks[0];
    var gesture = classifyGesture(landmarks);

    var names = ['拇指', '食指', '中指', '无名指', '小指'];
    var thumbUp = Math.abs(landmarks[4].x - landmarks[2].x) > 0.05;
    var debugFingers = [];
    debugFingers.push((thumbUp ? '↑' : '↓') + names[0]);
    for (var i = 1; i < 5; i++) {
      var tip = 4 + i * 4, pip = tip - 2;
      var up = landmarks[tip].y < landmarks[pip].y - 0.005;
      debugFingers.push((up ? '↑' : '↓') + names[i]);
    }

    if (gesture) {
      var emp = employeeMap[gesture];
      var empName = emp ? emp.name : gesture;
      statusEl.innerHTML = '检测到手势: <span class="detected">' + gesture + ' → @' + empName + '</span>';
      updateFeedback(gesture);

      if (lastGesture !== gesture) {
        lastGesture = gesture;
        gestureHoldStart = Date.now();
      } else if (Date.now() - gestureHoldStart > 1500) {
        // 保持手势1.5秒触发
        if (employeesLoaded) {
          triggerGesture(gesture);
          gestureHoldStart = Date.now(); // 防止重复触发
        }
      }
    } else {
      statusEl.textContent = '手势未识别 ' + debugFingers.join(' ') + ' — 试试剪刀手/握拳/手掌';
      updateFeedback(null);
      lastGesture = null;
    }
  } else {
    statusEl.textContent = '未检测到手掌，请将手放在摄像头前';
    updateFeedback(null);
    lastGesture = null;
  }
}

// ---- 加载 CDN 并启动摄像头 ----
(function initGesture() {
  var statusEl = document.getElementById('gestureStatus');
  var demoNote = document.getElementById('demoNote');

  function fallbackToDemo(msg) {
    statusEl.textContent = '⚠ ' + msg + ' — 点击下方卡片可直接触发';
    demoNote.style.display = 'block';
  }

  function checkLibs() {
    return typeof Hands !== 'undefined' && typeof Camera !== 'undefined';
  }

  async function tryStartCamera() {
    if (!checkLibs()) {
      fallbackToDemo('手势识别库(MediaPipe)加载失败');
      return;
    }

    try {
      var stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      var videoEl = document.getElementById('webcam');
      videoEl.srcObject = stream;
      await videoEl.play();

      var hands = new Hands({
        locateFile: function(file) {
          return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/' + file;
        }
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.5
      });

      hands.onResults(onHandsResults);

      var cameraInstance = new Camera(videoEl, {
        onFrame: async function() { await hands.send({ image: videoEl }); },
        width: 640, height: 480
      });
      cameraInstance.start();

      statusEl.textContent = '✅ 摄像头就绪，请做手势（保持1.5秒触发） | 也可直接点击下方卡片';
      demoNote.style.display = 'none';
    } catch (e) {
      fallbackToDemo('摄像头错误: ' + e.message);
    }
  }

  function loadScript(src) {
    return new Promise(function(resolve, reject) {
      var script = document.createElement('script');
      script.src = src;
      script.crossOrigin = 'anonymous';
      script.onload = resolve;
      script.onerror = function() { reject(new Error('Failed to load: ' + src)); };
      document.head.appendChild(script);
    });
  }

  loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js')
    .then(function() { return loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js'); })
    .then(function() { setTimeout(tryStartCamera, 200); })
    .catch(function(e) { fallbackToDemo('CDN 加载超时/失败'); });
})();
</script>
</body>
</html>
